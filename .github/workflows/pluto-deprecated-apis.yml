name: Pluto deprecated API check

on:
  workflow_call:
    inputs:
      target-version:
        required: false
        type: string
        default: 'v1.31.0'

jobs:
  pluto:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4

      - name: Install Pluto
        run: |
          curl -sSL https://github.com/FairwindsOps/pluto/releases/download/v5.24.0/pluto_5.24.0_linux_amd64.tar.gz | \
            tar xz -C /usr/local/bin pluto

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@cf79a64fed8a943fb1073260883d08fe0dfb4e56

      - name: Build overlays
        id: build
        shell: bash
        run: |
          set -euo pipefail
          out_dir="out/kustomize"
          mkdir -p "$out_dir"

          changed_files="${{ steps.changed-files.outputs.all_changed_files }}"
          changed_root_for() {
            local path="$1"
            IFS=/ read -r top second third fourth _ <<< "$path"

            case "$path" in
              apps/clubs/*/*/*)
                printf '%s/%s/%s/%s\n' "$top" "$second" "$third" "$fourth"
                ;;
              apps/*/*|bases/*/*|system/*/*|common/*/*)
                printf '%s/%s\n' "$top" "$second"
                ;;
            esac
          }

          to_rebuild=$(
            { printf '%s\n' "$changed_files" | tr ' ' '\n' | grep -E '^(apps|bases|system|common)/' || true; } |
            while IFS= read -r changed_file; do
              changed_root_for "$changed_file"
            done |
            sed 's:/$::' | sort -u
          )

          if [ -z "${to_rebuild:-}" ]; then
            echo "Nothing to check."
            echo "built_any=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          roots=()
          for d in apps bases system common; do
            [ -d "$d" ] && roots+=("./$d")
          done
          [ "${#roots[@]}" -eq 0 ] && { echo "built_any=false" >> "$GITHUB_OUTPUT"; exit 0; }

          find "${roots[@]}" \
            -type f \( -name kustomization.yaml -o -name kustomization.yml \) \
            -not -path '*/base/*' -print0 |
          while IFS= read -r -d '' kustom; do
            dir="$(dirname "$kustom")"
            rel="${dir#./}"
            should_build=false
            while IFS= read -r root_key; do
              [ -z "$root_key" ] && continue
              if [[ "$rel" == "$root_key" || "$rel" == "$root_key"/* ]]; then
                should_build=true
                break
              fi
            done <<< "$to_rebuild"

            if [ "$should_build" = true ]; then
              name="${rel//\//_}.yaml"
              kubectl kustomize --enable-helm \
                --load-restrictor LoadRestrictionsNone \
                "$dir" > "$out_dir/$name" 2>/dev/null || rm -f "$out_dir/$name"
            fi
          done

          shopt -s nullglob
          files=( "$out_dir"/*.yaml )
          if [ ${#files[@]} -gt 0 ]; then
            echo "built_any=true" >> "$GITHUB_OUTPUT"
          else
            echo "built_any=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for deprecated APIs
        if: steps.build.outputs.built_any == 'true'
        run: |
          pluto detect-files \
            -d ./out/kustomize/ \
            --target-versions k8s=${{ inputs.target-version }} \
            -o wide
